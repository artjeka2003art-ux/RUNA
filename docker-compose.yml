version: "3.9"

services:

  # --- Databases ---

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
      - "7474:7474"   # web UI — open localhost:7474 to see the graph
      - "7687:7687"   # bolt protocol
    volumes:
      - neo4j_data:/data

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: runa
      POSTGRES_PASSWORD: runa
      POSTGRES_DB: runa
    ports:
      - "5433:5432"   # 5433 outside because 5432 is taken locally
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"   # 6380 outside because 6379 is taken locally
    volumes:
      - redis_data:/data

  # --- Backend ---

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      POSTGRES_URL: postgresql://runa:runa@postgres:5432/runa
      REDIS_URL: redis://redis:6379
    depends_on:
      - neo4j
      - postgres
      - redis

volumes:
  neo4j_data:
  postgres_data:
  redis_data:
